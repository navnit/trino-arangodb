name: CI

on:
  push:
    branches: [master]
  pull_request:

# Cancel superseded runs on the same ref (e.g. a new push to an open PR).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build and test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # maven.compiler.release=24 in pom.xml requires a JDK >= 24.
      - name: Set up JDK 24
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '24'
          cache: maven

      # Pre-pull the ArangoDB image before the test phase. The M3 cluster ITs boot four
      # arangod nodes at once; on a cold 2-vCPU runner, pulling and extracting the ~450MB
      # image while the cluster is trying to form starves coordinator startup and pushed it
      # past the Testcontainers wait window (the ShardParallel*IT setup timeouts). Warming
      # the image here means that window is spent on cluster formation alone.
      - name: Pre-pull ArangoDB image
        run: docker pull arangodb/arangodb:3.12

      # 'verify' runs the full test phase first: the suite is almost entirely
      # Testcontainers-based (a real arangodb/arangodb:3.12 container per test class,
      # plus DistributedQueryRunner end-to-end tests), which needs Docker. It then runs
      # the failsafe integration tests. By default the pom EXCLUDES the @Tag("cluster")
      # ITs (ShardParallelClusterIT, ShardParallelCorrectnessIT) -- booting a real
      # multi-node ArangoDB cluster is too slow/flaky to reliably form within the wait
      # window on a 2-vCPU runner, and was blocking every PR -- so this gate runs only the
      # fast, reliable ITs (PackagingSmokeIT: a real trinodb/trino:476 container with the
      # just-packaged plugin mounted, queried over JDBC). The cluster ITs run separately in
      # the non-blocking `cluster-its` job below. GitHub's ubuntu-latest runners ship both
      # Docker and the Docker Compose v2 CLI, so no extra setup is needed.
      #
      # pom.xml pins the Testcontainers-shaded docker-java client's Remote API version
      # (surefire/failsafe api.version property) to work around its lack of negotiation. Its
      # default (1.51) suits a modern local Docker Engine but is rejected as "too new"
      # by an older Engine, so here we hand Maven the runner daemon's own reported max
      # via -Ddocker.api.version. The value is echoed first, unconditionally, so the
      # log shows exactly which API version this runner offered.
      - name: Build and test
        run: |
          DOCKER_API=$(docker version --format '{{.Server.APIVersion}}')
          echo "Runner Docker Server API version: ${DOCKER_API}"
          mvn -B --no-transfer-progress -Ddocker.api.version="${DOCKER_API}" verify

      - name: Upload plugin artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: trino-arangodb-plugin
          path: target/*.zip
          if-no-files-found: warn

  # Heavy multi-node ArangoDB cluster ITs, run in isolation so they never gate a PR.
  # continue-on-error makes the whole job non-blocking: it exercises shard fan-out
  # end-to-end and surfaces its result, but a slow/failed cluster boot on a resource-starved
  # runner does not fail the overall CI run. surefire.skip=true skips the unit + e2e phase so
  # the cluster boot gets a clean, uncontended runner (the earlier container tests were part
  # of what starved it). Invoked via the cluster-its profile, which flips the failsafe tag
  # filter to run ONLY the @Tag("cluster") ITs.
  cluster-its:
    name: Cluster ITs (non-blocking)
    runs-on: ubuntu-latest
    continue-on-error: true
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 24
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '24'
          cache: maven

      - name: Pre-pull ArangoDB image
        run: docker pull arangodb/arangodb:3.12

      - name: Cluster integration tests
        run: |
          DOCKER_API=$(docker version --format '{{.Server.APIVersion}}')
          echo "Runner Docker Server API version: ${DOCKER_API}"
          mvn -B --no-transfer-progress -Ddocker.api.version="${DOCKER_API}" \
            -Pcluster-its -Dsurefire.skip=true verify
